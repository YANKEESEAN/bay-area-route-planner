    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入高德地图API -->
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=b496d51ec22e60384e87c2eb6f8d11ea"></script>
    <!-- 引入UI组件库用于绘制路线 -->
    <script type="text/javascript" src="https://webapi.amap.com/ui/1.1/main.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        accent: '#8B5CF6',
                        danger: '#EF4444',
                        dark: '#1E293B',
                        light: '#F8FAFC'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        body {
          margin: 0;
          padding: 0;
        }
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .bg-gradient-primary {
                background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            }
            .bg-gradient-secondary {
                background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            }
            .bg-gradient-danger {
                background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
            }

    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden my-6 md:my-10">
        <!-- 头部 -->
        <header class="bg-gradient-primary text-white p-6 md:p-8">
            <div class="text-center">
                <h1 class="text-3xl md:text-4xl font-bold mb-3 flex items-center justify-center">
                    <i class="fa fa-map-marker mr-3"></i>粤港澳大湾区旅游路径规划系统
                </h1>
                <p class="text-lg md:text-xl opacity-90">包含香港、澳门及珠三角主要城市的智能旅游路线规划</p>
            </div>
        </header>

        <!-- 主要内容区 -->
        <div class="flex flex-col md:flex-row">
            <!-- 左侧选择面板 -->
            <div class="w-full md:w-1/3 bg-gray-50 border-r border-gray-200">
                <div class="p-5">
                    <h2 class="text-xl font-bold text-dark mb-4 flex items-center">
                        <i class="fa fa-map-signs mr-2 text-primary"></i>选择景点
                    </h2>

                    <div class="bg-white rounded-lg p-3 mb-5 text-center">
                        <p class="font-medium text-gray-700">
                            已选择: <span id="selectedCount" class="text-primary font-bold">0</span>
                            / <span id="totalAttractions" class="text-gray-600">0</span> 个景点
                        </p>
                    </div>

                    <!-- 景点搜索筛选 -->
                    <div class="mb-4">
                        <input type="text" id="attractionFilter"
                            class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary"
                            placeholder="搜索景点...">
                    </div>

                    <!-- 城市标签切换 -->
                    <div class="mb-5 overflow-x-auto scrollbar-hide pb-2">
                        <div class="flex space-x-2 min-w-max" id="cityTabs">
                            <!-- 城市标签将通过JavaScript动态生成 -->
                        </div>
                    </div>

                    <!-- 景点网格 -->
                    <div class="bg-white rounded-lg border border-gray-200 max-h-[400px] overflow-y-auto p-3 mb-6">
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2" id="attractionsGrid">
                            <!-- 景点按钮将通过JavaScript动态生成 -->
                        </div>
                    </div>

                    <!-- 控制按钮 -->
                    <div class="space-y-3">
                        <select id="algorithmSelect" class="w-full px-4 py-3 rounded-lg border-2 border-primary bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary/50">
                            <option value="greedy"><i class="fa fa-bolt mr-1"></i> 贪婪算法 (快速规划)</option>
                            <option value="aco"><i class="fa fa-bug mr-1"></i> ACO算法 (最优路径)</option>
                            <option value="dp"><i class="fa fa-sitemap mr-1"></i> 动态规划算法 (精确规划)</option>
                            <option value="genetic"><i class="fa fa-random mr-1"></i> 遗传算法 (全局优化)</option>
                        </select>

                        <button id="calculateBtn" disabled class="w-full py-3 px-4 bg-gradient-secondary text-white rounded-lg font-medium shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-secondary/50">
                            <i class="fa fa-rocket mr-2"></i>开始路径规划
                        </button>

                        <button id="resetBtn" class="w-full py-3 px-4 bg-gradient-danger text-white rounded-lg font-medium shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-danger/50">
                            <i class="fa fa-refresh mr-2"></i>重新选择
                        </button>
                    </div>
                </div>
            </div>

            <!-- 右侧结果面板 -->
            <div class="w-full md:w-2/3 p-5">
                <h2 class="text-xl font-bold text-dark mb-4 flex items-center">
                    <i class="fa fa-bar-chart mr-2 text-primary"></i>规划结果
                </h2>

                <!-- 状态提示 -->
                <div id="loading" class="hidden mb-5 bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-lg">
                    <div class="flex items-center">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary mr-3"></div>
                        <p>正在智能规划最佳路径，请稍候...</p>
                    </div>
                </div>

                <div id="errorMessage" class="hidden mb-5 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg"></div>
                <div id="successMessage" class="hidden mb-5 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg"></div>

                <!-- 路径显示 -->
                <div class="bg-gray-50 rounded-lg border border-gray-200 p-5 mb-6 min-h-[150px]">
                    <div id="pathDisplay" class="flex flex-wrap items-center justify-center">
                        <p class="text-gray-500 italic">请选择景点并点击"开始路径规划"</p>
                    </div>
                </div>

                <!-- 结果统计 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-lg p-4 shadow-lg">
                        <h3 class="text-sm font-medium opacity-90 mb-2">总距离</h3>
                        <div class="text-2xl font-bold" id="totalDistance">--</div>
                    </div>
                    <div class="bg-gradient-to-br from-green-500 to-teal-600 text-white rounded-lg p-4 shadow-lg">
                        <h3 class="text-sm font-medium opacity-90 mb-2">总时间</h3>
                        <div class="text-2xl font-bold" id="totalTime">--</div>
                    </div>
                    <div class="bg-gradient-to-br from-purple-500 to-pink-600 text-white rounded-lg p-4 shadow-lg">
                        <h3 class="text-sm font-medium opacity-90 mb-2">访问景点</h3>
                        <div class="text-2xl font-bold" id="placesCount">--</div>
                    </div>
                </div>

                <!-- 路径保存与分享功能 -->
                <div class="mt-4 flex gap-2">
                    <button id="savePathBtn" class="px-4 py-2 bg-primary text-white rounded-lg text-sm hover:bg-primary/90">
                        <i class="fa fa-save mr-1"></i>保存路径
                    </button>
                    <button id="sharePathBtn" class="px-4 py-2 bg-accent text-white rounded-lg text-sm hover:bg-accent/90">
                        <i class="fa fa-share-alt mr-1"></i>分享路径
                    </button>
                </div>

                <!-- 地图显示区域 -->
                <div class="mt-6">
                    <h3 class="text-lg font-semibold text-dark mb-3">
                        <i class="fa fa-map mr-2 text-primary"></i>路径地图
                    </h3>
                    <div id="mapContainer" class="w-full h-[400px] rounded-lg border border-gray-200"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 景点详情弹窗 -->
    <div id="attractionModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg max-w-md w-full max-h-[80vh] overflow-y-auto">
            <div class="p-4 border-b">
                <h3 id="modalTitle" class="text-xl font-bold"></h3>
                <button id="closeModal" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div id="modalContent" class="p-4">
                <!-- 景点详情内容 -->
            </div>
        </div>
    </div>

        // 初始化城市标签和景点
        function initializeAttractions() {

                const buttons = document.querySelectorAll('#attractionsGrid button');

                buttons.forEach(button => {
                    const text = button.textContent.toLowerCase();
                    if (text.includes(filterText)) {
                        button.style.display = '';
                    } else {
                        button.style.display = 'none';
                    }
                });
            });
        }

            grid.innerHTML = ''; // 清空现有内容

            cityAttractions[city].forEach(attraction => {
                const button = document.createElement('button');
                button.className = `px-2 py-2 text-sm rounded-md transition-all duration-200 transform hover:-translate-y-0.5 ${

        // 规划路径
        async function calculatePath() {
            console.log('开始规划路径');
            if (selectedAttractions.size < 2) {
                showMessage('errorMessage', '请至少选择2个景点！');
                return;
            }

            const algorithm = document.getElementById('algorithmSelect').value;
            const selectedAttractionsArray = Array.from(selectedAttractions);

            // 显示加载中
            document.getElementById('loading').classList.remove('hidden');
            hideMessage('errorMessage');
            hideMessage('successMessage');

            try {
                const response = await fetch('/calculate-path', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        attractions: selectedAttractionsArray,
                        algorithm: algorithm
                    })
                });

                const data = await response.json();

                if (data.success) {
                    displayResults(data);
                    let algoName = '';
                    switch(algorithm) {
                        case 'greedy':
                            algoName = '贪婪算法';
                            break;
                        case 'aco':
                            algoName = 'ACO算法';
                            break;
                        case 'dp':
                            algoName = '动态规划算法';
                            break;
                        case 'genetic':
                            algoName = '遗传算法';
                            break;
                        default:
                            algoName = '未知算法';
                    }
                    showMessage('successMessage', `路径规划成功！使用${algoName}`);
                } else {
                    showMessage('errorMessage', data.error || '路径规划失败，请重试！');
                }
            } catch (error) {
                showMessage('errorMessage', '网络错误，请检查后端服务是否启动！');
                console.error('Error:', error);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        // 初始化地图
        function initMap() {
            try {
                // 初始中心点设为广州
                map = new AMap.Map("mapContainer", {
                    zoom: 10,
                    center: [113.27, 23.13] // 广州经纬度
                });

                // 检查并添加地图控件，避免控件不存在导致的错误
                if (typeof AMap.ToolBar === 'function') {
                    map.addControl(new AMap.ToolBar());
                } else {
                    console.warn('AMap.ToolBar控件不可用，已跳过');
                }

                if (typeof AMap.Scale === 'function') {
                    map.addControl(new AMap.Scale());
                } else {
                    console.warn('AMap.Scale控件不可用，已跳过');
                }

                if (typeof AMap.MapType === 'function') {
                    map.addControl(new AMap.MapType());
                } else {
                    console.warn('AMap.MapType控件不可用，已跳过');
                }

                console.log('地图初始化成功');
            } catch (error) {
                console.error('地图初始化失败:', error);
                showMessage('errorMessage', '地图加载失败: ' + error.message);
            }

            // 调整地图高度
            adjustMapHeight();
        }

        // 根据景点名称获取经纬度
        async function getLocation(placeName) {
            if (attractionCoordinates[placeName]) {
                return {
                    ...attractionCoordinates[placeName],
                    name: placeName
                };
            }
            // 这里使用高德地图的POI搜索API获取坐标
            return new Promise((resolve) => {
                AMap.plugin('AMap.PlaceSearch', function() {
                    const placeSearch = new AMap.PlaceSearch({
                        city: '全国', // 搜索范围
                        pageSize: 1
                    });

                    placeSearch.search(placeName, function(status, result) {
                        if (status === 'complete' && result.poiList.pois.length > 0) {
                            const location = result.poiList.pois[0].location;
                            resolve({
                                lng: location.lng,
                                lat: location.lat,
                                name: placeName
                            });
                        } else {
                            console.warn(`未找到 ${placeName} 的位置`);
                            resolve(null);
                        }
                    });
                });
            });
        }

        // 清除现有标记和路线
        function clearMap() {
            // 清除标记
            markers.forEach(marker => map.remove(marker));
            markers = [];

            // 清除路线
            if (polyline) {
                map.remove(polyline);
                polyline = null;
            }
        }

        // 在地图上绘制路径
        async function drawPathOnMap(path) {
            // 清除现有内容
            clearMap();

            if (!map) {
                initMap();
            }

            // 获取所有景点的坐标
            const locations = [];
            for (const place of path) {
                const loc = await getLocation(place);
                if (loc) {
                    locations.push(loc);
                }
            }

            if (locations.length < 2) {
                alert("无法绘制路径：至少需要2个有效的景点位置");
                return;
            }

            // 添加标记点
            locations.forEach((loc, index) => {
                const marker = new AMap.Marker({
                    position: [loc.lng, loc.lat],
                    title: loc.name,
                    label: {
                        content: `${index + 1}`,
                        offset: new AMap.Pixel(-5, -20)
                    }
                });
                marker.setMap(map);
                markers.push(marker);

                // 点击标记显示详情
                marker.on('click', function() {
                    showAttractionDetail(loc.name);
                });
            });


            // 绘制路线
            const pathCoordinates = locations.map(loc => [loc.lng, loc.lat]);
            polyline = new AMap.Polyline({
                path: pathCoordinates,
                strokeColor: "#3B82F6", // 线颜色
                strokeWeight: 5,       // 线宽
                strokeOpacity: 0.8     // 透明度
            });
            polyline.setMap(map);

            // 调整地图视野以显示所有标记
            map.setFitView(markers);
        }

        // 显示规划结果
        function displayResults(data) {
            const pathDisplay = document.getElementById('pathDisplay');
            const path = data.path_names;

            // 显示路径文本
            let pathHTML = '';
            path.forEach((place, index) => {
                let flag = '';
                if (cityAttractions["香港"].includes(place)) {
                    flag = '<span class="ml-1 text-xs inline-block px-1 bg-red-500 text-white rounded">港</span>';
                } else if (cityAttractions["澳门"].includes(place)) {
                    flag = '<span class="ml-1 text-xs inline-block px-1 bg-green-500 text-white rounded">澳</span>';
                }

                pathHTML += `<div class="bg-primary text-white px-3 py-1.5 rounded-full m-1 text-sm flex items-center cursor-pointer hover:bg-primary/80" onclick="showAttractionDetail('${place}')">
                                ${place}${flag}
                            </div>`;
                if (index < path.length - 1) {
                    pathHTML += '<i class="fa fa-long-arrow-right text-gray-400 my-2"></i>';
                }
            });
            pathDisplay.innerHTML = pathHTML;

            // 显示统计信息
            document.getElementById('totalDistance').textContent =
                `${(data.total_distance)} km`;

            // 处理时间显示
            const totalMinutes = Math.round(data.total_time);
            let timeDisplay;
            if (totalMinutes >= 60) {
                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;
                timeDisplay = minutes > 0
                    ? `${hours}小时${minutes}分钟`
                    : `${hours}小时`;
            } else {
                timeDisplay = `${totalMinutes}分钟`;
            }
            document.getElementById('totalTime').textContent = timeDisplay;

            document.getElementById('placesCount').textContent =
                `${data.places_visited} 个`;

            // 在地图上绘制路径
            drawPathOnMap(path);
        }

        // 显示景点详情

                detail = `暂无${attraction}的详细信息，敬请期待。`;

            // 添加景点位置信息

                          </div>`;
            }

            modalContent.innerHTML = `<p class="mb-3">${detail}</p>`;
            modal.classList.remove('hidden');

        document.addEventListener('DOMContentLoaded', function() {
            // 先初始化景点数据
            initializeAttractions();

            // 检查地图API是否加载成功
            if (typeof AMap === 'undefined') {
                console.error('高德地图API未加载，请检查引入是否正确');
                showMessage('errorMessage', '地图加载失败，请刷新页面重试');

                // 延迟初始化地图，确保API完全加载
                setTimeout(initMap, 500);
            }

            // 获取按钮元素并添加日志，确保元素存在
            const calculateBtn = document.getElementById('calculateBtn');
            const resetBtn = document.getElementById('resetBtn');
            const savePathBtn = document.getElementById('savePathBtn');
            const sharePathBtn = document.getElementById('sharePathBtn');
            const closeModalBtn = document.getElementById('closeModal');

            if (!calculateBtn || !resetBtn) {
                console.error('未找到计算按钮或重置按钮元素');

            // 为计算按钮添加点击事件，带日志输出
            calculateBtn.addEventListener('click', function() {

                resetSelection();

            savePathBtn.addEventListener('click', function() {
                const pathData = {
                    name: `旅游路径_${new Date().toLocaleDateString()}`,
                    attractions: Array.from(selectedAttractions),
                    timestamp: new Date().getTime()
                };

                const savedPaths = JSON.parse(localStorage.getItem('savedPaths') || '[]');
                savedPaths.push(pathData);
                localStorage.setItem('savedPaths', JSON.stringify(savedPaths));

                showMessage('successMessage', '路径已保存！');
            });

            // 分享路径功能
            sharePathBtn.addEventListener('click', function() {
                if (selectedAttractions.size < 2) {
                    showMessage('errorMessage', '请先选择景点并完成路径规划');
                    return;
                }

                const pathStr = Array.from(selectedAttractions).join(',');
                const shareText = `我在粤港澳大湾区旅游路径规划系统中规划了一条路线：${pathStr}`;

                if (navigator.share) {
                    navigator.share({
                        title: '粤港澳大湾区旅游路径',
                        text: shareText
                    }).catch(err => {
                        console.log('分享失败:', err);
                        // 分享失败时回退到复制到剪贴板
                        navigator.clipboard.writeText(shareText)
                            .then(() => showMessage('successMessage', '路径已复制到剪贴板！'));
                    });
                } else {
                    // 复制到剪贴板
                    navigator.clipboard.writeText(shareText)
                        .then(() => showMessage('successMessage', '路径已复制到剪贴板！'));
                }
            });

            // 关闭弹窗按钮事件
            closeModalBtn.addEventListener('click', closeAttractionModal);

            // 点击弹窗外部关闭弹窗
            document.getElementById('attractionModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeAttractionModal();
                }
            });

            // 监听窗口大小变化，调整地图高度
            window.addEventListener('resize', adjustMapHeight);

            // 额外添加按钮状态检查
            setInterval(() => {
                const isDisabled = calculateBtn.disabled;
                console.log(`计算按钮状态: ${isDisabled ? '禁用' : '可用'}`);
                console.log(`已选择景点数量: ${selectedAttractions.size}`);
            }, 3000);
        });

        // 全局函数，用于路径中的景点点击显示详情
        window.showAttractionDetail = showAttractionDetail;

    </script>
</body>
</html>
